name: Build & Package

on:
  push:
    branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/TimeGuard.Tests --no-build -c Release --logger "console;verbosity=normal"

      - name: Publish (single-file win-x64)
        run: >
          dotnet publish src/TimeGuard.App
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish/

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          # IncludeNativeLibrariesForSelfExtract bundles all native DLLs into the exe.
          # DebugType=None suppresses PDB files. Zip contains only TimeGuard.exe.
          Compress-Archive -Path publish/TimeGuard.exe -DestinationPath release/TimeGuard-win-x64.zip -Force
          Write-Host "Created release/TimeGuard-win-x64.zip ($([math]::Round((Get-Item release/TimeGuard-win-x64.zip).Length / 1MB, 1)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeGuard-win-x64
          path: release/TimeGuard-win-x64.zip
          retention-days: 30

      # ── GitHub Release (only on version tags, e.g. v1.0.0) ──────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "TimeGuard ${{ github.ref_name }}"
          body: |
            ## TimeGuard ${{ github.ref_name }}

            Self-contained Windows x64 build — no .NET runtime required.

            **Install:**
            1. Download and extract `TimeGuard-win-x64.zip` to a permanent folder (e.g. `C:\Program Files\TimeGuard\`)
            2. Run `TimeGuard.exe`
          files: release/TimeGuard-win-x64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
